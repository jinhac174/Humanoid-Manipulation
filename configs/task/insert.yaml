
gym_id:         "G1-Insert-v0"
log_name:       "insert"
env_cfg_module: "manipulation.tasks.insert.env_cfg"
env_cfg_class:  "InsertEnvCfg"

# reward weights (multiplicative composition — see rewards.py)
reward_scale: 1.0

# spawn randomization
peg_spawn_x_range:   [-0.03, 0.03]
peg_spawn_y_range:   [-0.03, 0.03]
block_spawn_x_range: [-0.05, 0.05]
block_spawn_y_range: [-0.05, 0.05]
block_spawn_yaw_range: [-0.3, 0.3]

cameras:
  sideview:
    eye:    [1.5, -1.0, 1.3]
    lookat: [0.6,  0.0, 0.9]
  overview:
    eye:    [-0.9, -2.1, 1.74]
    lookat: [0.5,   0.0,  0.65]

viewer:
  resolution: [1280, 720]
  eye:    [1.5, -1.0, 1.3]
  lookat: [0.6,  0.0, 0.9]