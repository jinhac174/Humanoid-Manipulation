gym_id: Reorient
log_name: reorient
env_cfg_module: manipulation.tasks.reorient.env_cfg
env_cfg_class: ReorientEnvCfg

episode_length_s: 10.0

# ── Scene layout (uncomment to override env_cfg.py defaults) ──────────────────
# target_volume_origin: [0.55, 0.0, 1.05]
# target_volume_extent: [[-0.10, 0.10], [-0.20, 0.20], [-0.05, 0.15]]
# cuboid_spawn_pos:     [0.55, 0.0, 0.975]
# object_drop_z:        0.70

# ── Donor reward scales (Phase A unused; Phase C wires them in) ───────────────
# lifting_rew_scale:        20.0
# lifting_bonus:            300.0
# lifting_bonus_threshold:  0.15
# keypoint_rew_scale:       200.0
# distance_delta_rew_scale: 50.0
# reach_goal_bonus:         1000.0

# ── Curriculum (Phase D only) ─────────────────────────────────────────────────
# enable_curriculum:              false
# success_tolerance:              0.075
# target_success_tolerance:       0.01
# tolerance_curriculum_increment: 0.9
# tolerance_curriculum_interval:  3000

cameras:
  sideview:
    eye:    [0.55, 1.5, 1.1]
    lookat: [0.55, 0.0, 1.0]
  overview:
    eye:    [2.0, -1.0, 1.8]
    lookat: [0.3, 0.0, 0.9]

viewer:
  resolution: [1280, 720]
  env_index: 0
  origin_type: world